<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Producer</title>
</head>
<body>
    <h1>Simulation de Clic</h1>
    <input type="text" id="userId" placeholder="Entrez ID Utilisateur" value="user_123">
    <button onclick="sendEvent()">Cliquer ici</button>

    <p id="response"></p>

        <script>
            function sendEvent() {
                let userId = document.getElementById("userId").value;
                fetch('/click?userId=' + userId, { method: 'POST' })
                    .then(response => response.text())
                    .then(data => document.getElementById("response").innerText = data);
            }
        </script>
</body>
</html>
