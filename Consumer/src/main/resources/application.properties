spring.application.name=Consumer
# Port différent (8082 si le Producer est sur 8080)
server.port=8082

# Désérialiseurs (Kafka envoie des octets, on veut du String et du Long)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Change le nom du groupe (ajoute un 'v2' par exemple)
spring.kafka.consumer.group-id=analytics-group-v2
# On repart du début avec le nouveau format
spring.kafka.consumer.auto-offset-reset=earliest


